[phases.setup]
nixPkgs = ["nodejs_22", "nodePackages.pnpm", "ffmpeg", "yt-dlp"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile", "pip install bgutil-ytdlp-pot-provider --break-system-packages"]

[phases.build]
cmds = ["pnpm --filter @workspace/api-server run build"]

[start]
cmd = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
