[phases.setup]
nixPkgs = ["nodejs_22", "nodePackages.pnpm", "python311Full", "ffmpeg"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile", "python3 -m pip install yt-dlp --break-system-packages"]

[phases.build]
cmds = ["pnpm --filter @workspace/api-server run build"]

[start]
cmd = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
